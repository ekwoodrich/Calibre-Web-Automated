name: Fork - Build & Publish to GHCR

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  workflow_dispatch:

# Permissions needed for GHCR
permissions:
  contents: read
  packages: write

jobs:
  # --- Step 1: Run Fast Tests ---
  test:
    name: Fast Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libldap2-dev libsasl2-dev libssl-dev
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Create test environment structure
        run: |
          sudo mkdir -p /config /books/import /books/ingest /config/processed_books
          sudo chmod -R 777 /config /books
          touch /config/epub-fixer.log
          touch /config/converter.log
          touch /config/cwa.db
      
      - name: Run smoke and unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scripts
        run: |
          pytest -m "smoke or unit" -n auto --maxfail=3 -v --tb=short

  # --- Step 2: Build and Push Docker Image ---
  build-and-push:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VERSION=FORK_BUILD-${{ github.ref_name }}-${{ github.sha }}
